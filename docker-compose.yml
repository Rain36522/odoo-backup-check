networks:
  odooNetwork:
    driver: bridge

volumes:
  db-data:
  odoo-data:

services:

  adminer:
    container_name: postgre_adminer
    networks:
        - odooNetwork
    image: adminer
    ports:
      - 8080:8080

  postgresql:
    container_name: postgresql
    build:
      context: .              # dossier où se trouve le Dockerfile
      dockerfile: Dockerfile.postgresql
      args:
        DB_VERSION: ${DB_VERSION:-17}
    restart: unless-stopped
    networks: 
     - odooNetwork
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
  
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d postgres -h 127.0.0.1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

  odoo: 
    container_name: odoo
    build:
      context: .
      dockerfile: Dockerfile.odoo
      args:
        ODOO_VERSION: ${ODOO_VERSION:-19}
    restart: unless-stopped 
    depends_on: { postgresql: { condition: service_healthy } } 
    networks: 
     - odooNetwork
    user: root 
    volumes: 
      - ./odoo-data:/var/lib/odoo
      - ./odoo-conf:/etc/odoo
      - ./extra-addons:/mnt/extra-addons
      - ./odoo-backup:/mnt/backups
      - ./modules-custom:/mnt/custom-addons
    logging: 
      driver: "json-file" 
      options: 
        max-size: "50m"
        max-file: "3"
    ports:
      - 8069:8069
      - 8072:8072 


